services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-querymind}
      MYSQL_USER: ${DB_USER:-querymind}
      MYSQL_PASSWORD: ${DB_PASSWORD:-querymind}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Dev-only: auto-provisions a SEPARATE "querymind_demo" database (the
      # e-commerce seed dataset) plus a read-only user scoped to it, so the
      # AI chat has a real business database to query instead of QueryMind's
      # own app tables. Runs once, in this alphabetical order, on first
      # start only (docker-entrypoint-initdb.d only runs against an empty
      # data volume). Remove these three mounts in a real production
      # deployment — they must never touch a real environment.
      - ./seed-data/schema.sql:/docker-entrypoint-initdb.d/01-demo-schema.sql:ro
      - ./seed-data/seed_data.sql:/docker-entrypoint-initdb.d/02-demo-seed.sql:ro
      - ./infra/dev/init-dev-db-user.sh:/docker-entrypoint-initdb.d/03-dev-user.sh:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 20
      # First boot only: loading ~127k demo rows via the init scripts above
      # can take a couple of minutes before MySQL accepts connections at all.
      start_period: 90s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-querymind}
      DB_USER: ${DB_USER:-querymind}
      DB_PASSWORD: ${DB_PASSWORD:-querymind}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      CONNECTION_ENCRYPTION_KEY: ${CONNECTION_ENCRYPTION_KEY:?CONNECTION_ENCRYPTION_KEY is required}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ALLOWED_ORIGINS: http://localhost
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
