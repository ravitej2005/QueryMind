name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Spotless check (Google Java Style, rules.md §1)
        working-directory: backend
        run: mvn -B spotless:check
      - name: Build & unit test
        working-directory: backend
        run: mvn -B verify
        env:
          JWT_ACCESS_SECRET: ci-test-secret-please-change-32bytes-min
          JWT_REFRESH_SECRET: ci-test-secret-please-change-32bytes-2

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci || npm install
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Test
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t querymind-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t querymind-frontend:ci ./frontend
